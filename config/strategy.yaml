# ============================================================================
#  stablecoin_arbi — strategy & runtime configuration (single source of truth)
#  All tunable parameters live here (boros-style). Code reads via sca.config.CFG.
# ============================================================================

# 0-fee, yield-bearing stablecoin pairs. USDT/USDC held earn 0% (not listed).
universe:
  - symbol: USD1USDT
    apr: 0.10          # UTA holding interest while held
    kind: reserve
  - symbol: USDEUSDT
    apr: 0.035
    kind: synthetic    # delta-neutral; depeg tail risk -> position-cap in live
  - symbol: USDTBUSDT
    apr: 0.035
    kind: reserve
primary_symbol: USD1USDT

market:
  tick_size: 0.0001    # 1 bp — the hard spread floor
  fee_bps: 0.0         # 0-fee promotion (NOT permanent — edge dies if it reverts)
  bars_per_day_5m: 288
  market_volume_per_day:   # avg daily turnover (USD) for capacity checks
    USD1USDT: 2538200
    USDEUSDT: 17278905
    USDTBUSDT: 878295

# Recommended strategy: EMA-anchored slice ladder (variant "r1_6")
strategy:
  interest_apr: 0.10         # carry on held USD1 — VARIES (~6-10%); set to the CURRENT actual rate for honest PnL. Only affects the interest component of displayed PnL; the price-edge & markout gauges are carry-independent.
  anchor_ema_span: 21        # 1h EMA span used as the floating anchor
  rebuy_offset_bp: -1        # rebuy a slice at anchor - 1 bp (floating)
  rungs:     [1, 2, 3, 4, 5]                 # sell rung (bp above anchor) — lowered for higher trade frequency (was 5/7/10/14/20; price std~0.7bp so 5-20bp rarely触达)
  fractions: [0.15, 0.18, 0.20, 0.22, 0.25] # NAV fraction per slice (sum = 1.0)

backtest:
  alloc_usd: 10000
  adv_sweep_bp: [0, 0.5, 1.0, 1.5]   # adverse selection per fill (bp/side)
  fill_mode: touch                   # touch | strict
  liq_gate: null                     # null, or fraction (e.g. 0.2 = order <= 20% of bar turnover)

# Original Freqtrade strategy baseline (engine.py) — shown to LOSE to hold
baseline:
  apr:
    USD1USDT: 0.10
    USDEUSDT: 0.035
    USDTBUSDT: 0.035
  trend_window: 7
  mid_trend_threshold: 0.015

# Parameter sweep ranges (optimize/sweep.py) — with IS/OOS validation
sweep:
  slice_counts: [1, 3, 5, 7, 10]
  rung_ranges: [[3, 12], [5, 20], [5, 30]]
  shapes: [equal, front, back]

# Runtime launch defaults — the SINGLE source for paper/live/dashboard launch params.
# Precedence everywhere: env override > this block > code fallback
# (resolved via sca.config.runtime() / out_dir() / resolve_mode()).
runtime:
  symbol: USD1USDT       # default symbol for the paper/live engine (dryrun reads this too)
  seconds: 604800        # paper/live run length (7d); 0 = run forever
  mode: paper            # paper | live — env MODE / `sca live` / --mode override; live still gated
  dashboard_port: 3015   # web dashboard port
  testnet: true          # 3a SINGLE testnet source (env BYBIT_TESTNET > here > live.testnet > false);
                         #   true -> route ccxt to api-testnet.bybit.com. R1 read-client + maker client
                         #   read the ONE resolve_testnet() so they can never be on different venues.
  maker_enabled: false   # rollback knob (env MAKER_ENABLED > here > false): true -> armed-maker real-fill
                         #   order path (behind triple+R1 gate); false -> paper evaluate_fills
  allow_mainnet: false   # 3b MAINNET opt-in (D12) — DUAL confirm: this AND env LIVE_MAINNET_CONFIRM=yes
                         #   must BOTH be set to permit the LIVE (mainnet) venue. Default false => mainnet
                         #   refused (testnet stays the additive default). Distinct from LIVE_TRADING_CONFIRM
                         #   (the arm gate): one config edit alone can NEVER reach real money.
  # out_dir: ./out       # OPTIONAL unifier; UNSET -> per-caller defaults hold (engine ".", dashboard "./out")

# Live fill-quality (adverse-selection) measurement (tools/dryrun.py)
dryrun:
  seconds: 86400         # MEASUREMENT length (distinct from runtime.seconds — "measure ~1 day")
  horizons_sec: [5, 30]
  ws_url: "wss://stream.bybit.com/v5/public/spot"

# Paper / live trading engine (live/engine.py) — SAFETY GATE
#   PAPER is the default everywhere: it simulates fills off the live Bybit order
#   book, places NO real orders and needs NO API key.
#   Going LIVE (placing real orders) requires ALL of the following, or the engine
#   refuses with a clear error:
#     1. mode == live                          (run: sca live ... --mode live, or MODE=live)
#     2. env <confirm_env> == "yes"            (LIVE_TRADING_CONFIRM=yes)
#     3. API key + secret present in env       (BYBIT_API_KEY / BYBIT_API_SECRET)
#   Real trading is at your own risk — start in paper and watch the dashboard first.
live:                                 # live ORDER gate (launch mode now lives in runtime.mode)
  confirm_env: LIVE_TRADING_CONFIRM   # env var that must equal "yes" to allow live orders
  api_key_env: BYBIT_API_KEY          # env var holding the Bybit API key (live only)
  api_secret_env: BYBIT_API_SECRET    # env var holding the Bybit API secret (live only)
  testnet: false                      # DEPRECATED: superseded by runtime.testnet (single source, F13).
                                      #   Kept only as a redirected fallback for old configs; resolve_testnet()
                                      #   prefers runtime.testnet. Do NOT set both to different values.
  account_type: unified               # Bybit UTA (Unified Trading Account); informational
  dedicated_account: true             # true -> reconcile asserts EXACT balance equality (dedicated subaccount);
                                      #   false -> shared UTA: reconcile degrades to a lower-bound check (Codex P1)
  reconcile_tol: 1.0                  # R1 reconcile tolerance in COIN units (exchange vs local), e.g. 1.0 ~= $1
  max_order_usd: 2000                 # hard per-order notional cap (live safety limit). 3b: -1 => NO per-order
                                      #   cap (clamp + place hard-assert skipped). DANGER (D12): -1 removes the
                                      #   last-line guard against a garbage-size order — use ONLY after the
                                      #   canary validates sizing; NEVER on run #1.
  max_total_alloc_usd: -1             # 3b TOTAL deployment cap in USD (canary core safety, D12). The seed +
                                      #   the reconcile available-pool both honor it, so a funded wallet can't
                                      #   deploy everything (arb-execution-risk: enforce caps in the SIZING
                                      #   path, not just config). -1 => NO cap (use the full available wallet,
                                      #   the boss's "用钱包里所有的钱"). Canary run sets e.g. 300.
                                      #   MAINNET GUARDRAIL (D13): on mainnet the engine REFUSES to start with
                                      #   -1 (uncapped) UNLESS env LIVE_UNCAPPED_CONFIRM=yes (a 3rd deliberate
                                      #   confirm). A finite >0 cap needs no extra env. testnet/paper unaffected.
  max_loss_usd: 0                     # 3b MAX-LOSS kill-switch in USD (D12/D13). Each maker step (after fills
                                      #   are booked, before new placement) compares session drawdown (start_equity
                                      #   - current carry-free mark-to-market equity; settled interest EXCLUDED so
                                      #   yield can't mask a loss) to this; >= => cancel ALL resting orders
                                      #   (cancel-to-terminal) + HALT. 0 / -1 => DISABLED. Shipped default 0
                                      #   (testnet/paper unchanged); the real-money canary run MUST set it ON
                                      #   (e.g. 50) — on MAINNET it is MANDATORY (the engine refuses to start with
                                      #   max_loss_usd<=0 when allow_mainnet, D13; no exemption).
                                      #   The HALT is DURABLE (persisted to <symbol>_state.json): an auto-restart
                                      #   will NOT silently resume a halted bot — it refuses loudly until a human
                                      #   sets env LIVE_CLEAR_HALT=yes (keeps position, re-anchors the loss
                                      #   baseline) or deletes the state file (fresh start). No auto-reset.
  persist: true                       # crash-safe resume (D10): snapshot full state on every fill + every status
                                      #   write to out_dir/<symbol>_state.json, append fills to <symbol>_events.jsonl;
                                      #   restart reloads & continues. false = legacy in-memory only (loses data on
                                      #   restart). Run `--seconds 0` to run indefinitely (live). out_dir MUST be a
                                      #   persistent mount. LIVE caveat: see decisions.md D10 / plan R1 (exchange
                                      #   reconciliation required before trusting local state for REAL orders).

# Historical data fetcher (data/fetch.py)
data:
  days_5m: 210
  days_1h: 420

services:
  # ── Paper-trading engine (slice-ladder on LIVE Bybit data) — starts by default ──
  #    docker compose up -d --build          (override SYMBOL/SECONDS via env or .env)
  #    docker compose logs -f paper          (watch fills + markout summaries)
  #    engine writes ./out/status_<symbol>.json for the dashboard; CSV + per-boot logs in ./out
  #
  #    DEFAULT IS PAPER — simulates fills off the live order book, places NO real orders,
  #    needs NO API key. To go LIVE (real orders), set ALL of the following in .env:
  #        MODE=live
  #        LIVE_TRADING_CONFIRM=yes
  #        BYBIT_API_KEY=...   BYBIT_API_SECRET=...
  #    The engine refuses to trade unless mode==live AND confirm==yes AND keys present.
  #    Real trading is at your own risk — see config/strategy.yaml `live:` and .env.example.
  #
  #    *** REAL-MONEY / MAINNET (Phase 3b) — DO NOT run real funds in THIS auto-restart
  #    container. *** `restart: unless-stopped` (below) auto-restarts on exit, but the 3b
  #    max-loss kill-switch is durable: once it HALTs it PERSISTS to <symbol>_state.json and
  #    the engine REFUSES to resume trading on restart (it exits loudly until a human clears
  #    the halt with LIVE_CLEAR_HALT=yes or deletes the state file). So an auto-restart of a
  #    halted real-money bot becomes a harmless refuse-and-exit loop, NOT a fresh -max_loss
  #    bleed. Still, for an actual mainnet canary run the right home is BARE-METAL `sca live`
  #    (no auto-restart), so a halt simply stops. See docs/decisions.md D12/D13.
  paper:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-paper
    environment:
      - SCA_OUT_DIR=/app/out
    env_file:
      - path: .env
        required: false
    # symbol/seconds come from config/strategy.yaml `runtime:`; mode = env MODE (set in .env to go live)
    # > runtime.mode > paper. No --csv: the engine writes status_<symbol>.json + crash-safe state to /app/out.
    command: ["paper"]
    volumes:
      - ./out:/app/out
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    # PAPER default keeps auto-restart for measurement resilience. SAFE for real money too:
    # a persisted 3b halt makes the engine refuse-and-exit on resume (no silent re-trade) —
    # see the REAL-MONEY note above. Mainnet canary should still prefer bare-metal `sca live`.
    restart: unless-stopped

  # ── Live web dashboard (reads ./out/status_*.json) — starts by default ──
  #    docker compose up -d --build   ->   http://<host>:3015
  dashboard:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-dashboard
    # Docker dashboard uses a FIXED internal port 3015 (matches the ports: mapping below); this
    # service does NOT mount strategy.yaml, so it can't read runtime.dashboard_port at runtime
    # (code-review P2). runtime.dashboard_port is the BARE-METAL default for `sca dashboard`.
    # --out-dir is the container mount. To change the docker port, edit BOTH --port and ports:.
    command: ["dashboard", "--port", "3015", "--out-dir", "/app/out"]
    ports:
      - "${DASHBOARD_PORT:-3015}:3015"
    volumes:
      - ./out:/app/out
    restart: unless-stopped

  # ── Offline one-shot tools — opt-in (NOT started by plain `up`) ──
  #    docker compose --profile tools run --rm backtest
  backtest:
    build: .
    image: stablecoin-arbi:latest
    command: ["backtest"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  engine:                       # original Freqtrade strategy baseline (shows it loses to hold)
    build: .
    image: stablecoin-arbi:latest
    command: ["engine"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  sweep:                        # parameter sweep with IS/OOS validation
    build: .
    image: stablecoin-arbi:latest
    command: ["sweep"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  fetch:                        # refresh historical klines from Bybit into ./data
    build: .
    image: stablecoin-arbi:latest
    command: ["fetch"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

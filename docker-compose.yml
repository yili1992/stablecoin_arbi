services:
  # ── Paper-trading engine (slice-ladder on LIVE Bybit data) — starts by default ──
  #    docker compose up -d --build          (override SYMBOL/SECONDS via env or .env)
  #    docker compose logs -f paper          (watch fills + markout summaries)
  #    engine writes ./out/status_<symbol>.json for the dashboard; CSV + per-boot logs in ./out
  #
  #    DEFAULT IS DRYRUN — simulates fills off the live order book, places NO real orders,
  #    needs NO API key. To go LIVE (real orders, MAINNET, real money), set in .env:
  #        MODE=live
  #        BYBIT_API_KEY=...   BYBIT_API_SECRET=...
  #    MODE=live ALONE = real money (D14 — no extra confirm env); a missing key raises.
  #    Real trading is at your own risk — see config/strategy.yaml `live:` and .env.example.
  #
  #    This `paper` service is for DRYRUN (simulation); `restart: unless-stopped` is harmless
  #    because re-running a simulation costs nothing. For REAL money use the dedicated `live`
  #    service below (`restart: on-failure`): D16 makes docker-live SAFE — the operator-reconcile
  #    halt PERSISTS across restarts and a resumed-halted engine REFUSES to continue with a CLEAN
  #    exit (0), so on-failure recovers transient crashes but a halt stays stopped until a human
  #    resets it. The only real-money fund limit is live.max_total_alloc_usd (capital deployed =
  #    loss cap on a spot account). See docs/decisions.md D16.
  paper:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-paper
    environment:
      - SCA_OUT_DIR=/app/out
    env_file:
      - path: .env
        required: false
    # symbol/seconds come from config/strategy.yaml `runtime:`; mode = env MODE (set in .env to go live)
    # > runtime.mode > dryrun. No --csv: the engine writes status_<symbol>.json + crash-safe state to /app/out.
    # `sca paper` runs the engine in the resolved mode (dryrun by default).
    command: ["paper"]
    volumes:
      - ./out:/app/out
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    # DRYRUN default keeps auto-restart for measurement resilience (simulation is harmless to
    # re-run). For REAL money do NOT set MODE=live here (unless-stopped restarts on ANY exit,
    # incl. a clean halt-exit); use the dedicated `live` service below (restart: on-failure).
    restart: unless-stopped

  # ── Live real-money engine (MAINNET) — OPT-IN, NOT started by plain `up` ──
  #    docker compose --profile live up -d --build live     # real GTC PostOnly maker orders
  #    Needs BYBIT_API_KEY/BYBIT_API_SECRET in .env (a missing key raises at startup).
  #
  #    D16 — docker live is SAFE with auto-restart:
  #      • `restart: on-failure` recovers a TRANSIENT crash (e.g. network blip) — non-zero exit.
  #      • an operator-reconcile halt (unattributable fill / cancel-never-terminal / reject
  #        streak / durable-persist failure) PERSISTS to ./out/<symbol>_live_state.json and
  #        EXITS CLEANLY (code 0) -> on-failure does NOT restart it; the halted bot stays
  #        stopped until a human root-causes it. On ANY restart a resumed-halted engine still
  #        REFUSES the maker path and clean-exits again (belt + braces, regardless of policy).
  #      • clear the halt explicitly: delete ./out/<symbol>_live_state.json (fresh start) OR
  #        set LIVE_CLEAR_HALT=yes (clears the halt, keeps the position).
  #    The only real-money fund limit is live.max_total_alloc_usd (capital deployed = loss cap
  #    on a spot account). See docs/decisions.md D16.
  live:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-live
    environment:
      - SCA_OUT_DIR=/app/out
    env_file:
      - path: .env
        required: false
    # `sca live` injects --mode live (real money, MAINNET); symbol/seconds from strategy.yaml runtime:.
    command: ["live"]
    volumes:
      - ./out:/app/out                                   # PERSISTENT mount: the durable halt lives here
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    # on-failure: recover a transient crash (non-zero exit) but DO NOT loop a clean halt-exit (0).
    restart: on-failure
    profiles: ["live"]                                   # opt-in: starting real money must be explicit

  # ── Live web dashboard (reads ./out/status_*.json) — starts by default ──
  #    docker compose up -d --build   ->   http://<host>:3015
  dashboard:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-dashboard
    # Docker dashboard uses a FIXED internal port 3015 (matches the ports: mapping below); this
    # service does NOT mount strategy.yaml, so it can't read runtime.dashboard_port at runtime
    # (code-review P2). runtime.dashboard_port is the BARE-METAL default for `sca dashboard`.
    # --out-dir is the container mount. To change the docker port, edit BOTH --port and ports:.
    command: ["dashboard", "--port", "3015", "--out-dir", "/app/out"]
    ports:
      - "${DASHBOARD_PORT:-3015}:3015"
    volumes:
      - ./out:/app/out
    restart: unless-stopped

  # ── Offline one-shot tools — opt-in (NOT started by plain `up`) ──
  #    docker compose --profile tools run --rm backtest
  backtest:
    build: .
    image: stablecoin-arbi:latest
    command: ["backtest"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  engine:                       # original Freqtrade strategy baseline (shows it loses to hold)
    build: .
    image: stablecoin-arbi:latest
    command: ["engine"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  sweep:                        # parameter sweep with IS/OOS validation
    build: .
    image: stablecoin-arbi:latest
    command: ["sweep"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  fetch:                        # refresh historical klines from Bybit into ./data
    build: .
    image: stablecoin-arbi:latest
    command: ["fetch"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

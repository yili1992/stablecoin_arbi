services:
  # ── Live fill-quality (adverse-selection) measurement — starts by default ──
  #    docker compose up -d --build          (override SYMBOL/SECONDS via env or .env)
  #    docker compose logs -f dryrun         (watch live markout summaries)
  #    output CSV + per-boot logs land in ./out
  dryrun:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-dryrun
    environment:
      - SCA_OUT_DIR=/app/out
    env_file:
      - path: .env
        required: false
    command:
      - dryrun
      - --symbol
      - "${SYMBOL:-USD1USDT}"
      - --seconds
      - "${SECONDS:-86400}"
      - --csv
      - "/app/out/${SYMBOL:-USD1USDT}_adv.csv"
    volumes:
      - ./out:/app/out
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    restart: unless-stopped

  # ── Live web dashboard (reads ./out/status_*.json) — starts by default ──
  #    docker compose up -d --build   ->   http://<host>:3015
  dashboard:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-dashboard
    command: ["dashboard", "--port", "3015", "--out-dir", "/app/out"]
    ports:
      - "${DASHBOARD_PORT:-3015}:3015"
    volumes:
      - ./out:/app/out
    restart: unless-stopped

  # ── Offline one-shot tools — opt-in (NOT started by plain `up`) ──
  #    docker compose --profile tools run --rm backtest
  backtest:
    build: .
    image: stablecoin-arbi:latest
    command: ["backtest"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  engine:                       # original Freqtrade strategy baseline (shows it loses to hold)
    build: .
    image: stablecoin-arbi:latest
    command: ["engine"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  sweep:                        # parameter sweep with IS/OOS validation
    build: .
    image: stablecoin-arbi:latest
    command: ["sweep"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  fetch:                        # refresh historical klines from Bybit into ./data
    build: .
    image: stablecoin-arbi:latest
    command: ["fetch"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

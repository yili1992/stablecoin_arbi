services:
  # ── Trading engine (slice-ladder maker on LIVE Bybit data) — starts by default ──
  #    docker compose up -d --build          (DRYRUN by default: simulation, no orders, no key)
  #    docker compose logs -f bot            (watch fills + markout summaries)
  #    engine writes ./out/status_<symbol>.json for the dashboard; CSV + per-boot logs in ./out
  #
  #    ONE service — the MODE controls dryrun-vs-live (no separate paper/live services/profiles):
  #      • DEFAULT IS DRYRUN — simulates fills off the live order book, places NO real orders,
  #        needs NO API key. The markout (adverse-selection) gauge still runs.
  #      • To go LIVE (real GTC PostOnly maker orders, MAINNET, real money), set in .env:
  #            MODE=live
  #            BYBIT_API_KEY=...   BYBIT_API_SECRET=...
  #        (or set `runtime.mode: live` in config/strategy.yaml; env MODE wins over the file).
  #        MODE=live ALONE = real money (D14 — no extra confirm env); a missing API key raises
  #        at startup. Real trading is at your own risk — see config/strategy.yaml `live:`.
  #
  #    `restart: on-failure` is correct for BOTH modes (D16): a TRANSIENT crash (non-zero exit)
  #    recovers, but a deliberate operator-reconcile halt (unattributable fill / cancel-never-
  #    terminal / reject streak / durable-persist failure) PERSISTS to ./out/<symbol>_<mode>_state.json
  #    and EXITS CLEANLY (code 0) -> on-failure does NOT restart it; the halted bot stays stopped
  #    until a human root-causes it. On ANY restart a resumed-halted engine still REFUSES the maker
  #    path and clean-exits again (belt + braces). Clear the halt: delete the state file (fresh
  #    start) OR set LIVE_CLEAR_HALT=yes (clears the halt, keeps the position). The only real-money
  #    fund limit is live.max_total_alloc_usd (capital deployed = loss cap on a spot account).
  #    See docs/decisions.md D16/D17.
  bot:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-bot
    environment:
      - SCA_OUT_DIR=/app/out
    env_file:
      - path: .env
        required: false
    # symbol/seconds come from config/strategy.yaml `runtime:`; mode = env MODE > runtime.mode >
    # dryrun. No --csv: the engine writes status_<symbol>.json + crash-safe state to /app/out.
    # `paper` is the CLI launcher that runs the engine in the RESOLVED mode (dryrun by default).
    command: ["paper", "--symbol", "USD1USDT"]          # USD1: 默认 N5(5档, 保 8% carry)
    volumes:
      - ./out:/app/out                                   # PERSISTENT mount: the durable halt lives here
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
      - ./src:/app/src:ro                                # editable install resolves here, so
                                                         # `git pull && docker compose restart bot`
                                                         # picks up code changes WITHOUT a rebuild.
    restart: on-failure

  # ── 第二个 engine 实例: USDC @ Bitget (N1 单档纯交易) — 与 bot(USD1@Bybit) 同时跑, 一键 up ──
  #    per-symbol exchange: config universe[USDCUSDT].exchange=bitget 让 engine 自动走
  #    BitgetAdapter(feed+orders+reconcile+creds); per-symbol override 让它用 USDC 的 N1 参数
  #    (挂1bp单档)。Bitget 稳定币 0-fee(促销, 运维需确认)。
  #    各自 status_<symbol>.json / <symbol>_<mode>_state.json 按 symbol 隔离, 互不冲突。
  #    LIVE 时用 Bitget 独立子账户 key(下方 environment 注入)与 USD1@Bybit 资金/账户隔离;
  #    Bitget 是 OKX-family, 需 passphrase(BITGET_API_PASSPHRASE)。
  #    各自 live.max_total_alloc_usd 是损失上限。dryrun 不需要 key。
  bot-usdc:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-bot-usdc
    environment:
      - SCA_OUT_DIR=/app/out
      # Bitget 子账户凭证(LIVE)。dryrun 留空即可(模拟撮合, 不下单不读 key)。
      - BITGET_API_KEY=${BITGET_API_KEY:-}
      - BITGET_API_SECRET=${BITGET_API_SECRET:-}
      - BITGET_API_PASSPHRASE=${BITGET_API_PASSPHRASE:-}   # OKX-family 必需
    env_file:
      - path: .env
        required: false
    command: ["paper", "--symbol", "USDCUSDT"]          # USDC@Bitget: N1(挂1bp单档, 纯交易)
    volumes:
      - ./out:/app/out
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
      - ./src:/app/src:ro
    restart: on-failure

  # ── Live web dashboard (reads ./out/status_*.json) — starts by default ──
  #    docker compose up -d --build   ->   http://<host>:3015
  dashboard:
    build: .
    image: stablecoin-arbi:latest
    container_name: sca-dashboard
    # Docker dashboard uses a FIXED internal port 3015 (matches the ports: mapping below);
    # it still reads .env / strategy.yaml to filter status files to the active mode. To
    # change the docker port, edit BOTH --port and ports:.
    command: ["dashboard", "--port", "3015", "--out-dir", "/app/out"]
    env_file:
      - path: .env
        required: false
    ports:
      - "${DASHBOARD_PORT:-3015}:3015"
    volumes:
      - ./out:/app/out
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
      - ./src:/app/src:ro                                # code changes apply on `restart` (no rebuild)
    restart: unless-stopped

  # ── Offline one-shot tools — opt-in (NOT started by plain `up`) ──
  #    docker compose --profile tools run --rm backtest
  backtest:
    build: .
    image: stablecoin-arbi:latest
    command: ["backtest"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  engine:                       # original Freqtrade strategy baseline (shows it loses to hold)
    build: .
    image: stablecoin-arbi:latest
    command: ["engine"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  sweep:                        # parameter sweep with IS/OOS validation
    build: .
    image: stablecoin-arbi:latest
    command: ["sweep"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]

  fetch:                        # refresh historical klines from Bybit into ./data
    build: .
    image: stablecoin-arbi:latest
    command: ["fetch"]
    volumes:
      - ./data:/app/data
      - ./config/strategy.yaml:/app/config/strategy.yaml:ro
    profiles: ["tools"]
